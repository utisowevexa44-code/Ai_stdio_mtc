<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التدريب الإعلامي | Media Training Hub</title>
    <!-- استيراد الخطوط والأيقونات -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --media-blue: #2563eb;
            --media-gold: #ffb800;
            --media-bg: #09090b;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #111, #000);
            background-color: var(--media-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الواجهة الزجاجية */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .icon-box {
            background: var(--media-blue);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        textarea, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        textarea:focus, select:focus {
            border-color: var(--media-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-generate {
            width: 100%;
            background: var(--media-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-generate:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            font-size: 1rem;
            line-height: 1.8;
            display: none; /* مخفي حتى يظهر النتاج */
        }

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
            40% { color: white; text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .2em 0 0 white, .4em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .2em 0 0 white, .4em 0 0 white; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <div class="icon-box">
            <i data-lucide="cpu"></i>
        </div>
        <div>
            <h1>مركز التدريب الإعلامي</h1>
            <span style="font-size: 10px; color: #555; letter-spacing: 2px;">VISUAL CAPTION ARCHITECT</span>
        </div>
    </div>

    <div class="input-group">
        <label>ماذا يحدث في الصورة؟</label>
        <textarea id="eventDesc" rows="4" placeholder="مثال: لقطات من ورشة العمل اليوم حول مهارات المذيع الناجح..."></textarea>
    </div>

    <div class="input-group">
        <label>مرحلة الفعالية</label>
        <select id="eventPhase">
            <option value="START">🚀 انطلاق: الترحيب والبداية</option>
            <option value="MID">📸 تغطية: تفاعل المتدربين والكواليس</option>
            <option value="END">🎓 ختام: النجاح وتسليم الشهادات</option>
        </select>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateCaption()">
        <i data-lucide="zap"></i>
        <span>بدء التصميم الذكي</span>
    </button>

    <div id="result"></div>
</div>

<script>
    // تفعيل الأيقونات
    lucide.createIcons();

    async function generateCaption() {
        const desc = document.getElementById('eventDesc').value;
        const phase = document.getElementById('eventPhase').value;
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('generateBtn');
        
        // مفتاح الـ API الخاص بك (تأكد من جعل المستودع الخاص Private)
        const API_KEY = "AIzaSyBpE1qLlq2lej5YMtDunOyQBKxiR-CInJM"; 

        if(!desc) {
            alert("يرجى كتابة وصف بسيط أولاً");
            return;
        }

        // حالة التحميل
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-dots">جاري التصميم</span>';
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "✨ جاري الاتصال بمحرك Gemini وصياغة المحتوى...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `أنت خبير محتوى إعلامي. اكتب كابشن انستجرام احترافي لمركز تدريب إعلامي بناءً على الوصف التالي: "${desc}" والمرحلة هي: "${phase}". استخدم نبرة ملهمة، أضف هاشتاقات مناسبة، واختم بسؤال تفاعلي للجمهور.` }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            const aiText = data.candidates[0].content.parts[0].text;
            resultDiv.innerHTML = `<div style="white-space: pre-wrap;">${aiText}</div>`;

        } catch (error) {
            resultDiv.innerHTML = "❌ حدث خطأ: " + error.message;
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="zap"></i><span>إعادة التصميم</span>';
            lucide.createIcons();
        }
    }
</script>

</body>
</html>
